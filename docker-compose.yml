# Compose v2 format — no 'version' field needed
services:
  subserver:
    build: .
    container_name: subserver
    hostname: subserver
    init: true
    restart: always
    env_file:
      - ${SUBSERVER_ENV_FILE:-/etc/subserver/subserver.env}
    environment:
      - SUBSERVER_BIND=0.0.0.0
      - SUBSERVER_DB_PATH=/app/data/subserver.db
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - ${SUBSERVER_CONFIG_FILE:-./configs/default.json}:/app/configs/default.json:ro
      - ${SUBSERVER_DATA_DIR:-/var/lib/subserver}:/app/data
    networks:
      - remnawave-network

networks:
  remnawave-network:
    external: true
